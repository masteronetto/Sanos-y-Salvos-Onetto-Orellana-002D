services:
  postgres:
    image: postgres:16-alpine
    container_name: sanos-y-salvos-postgres
    environment:
      POSTGRES_DB: sanosysalvos
      POSTGRES_USER: sanos
      POSTGRES_PASSWORD: sanos123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sanos-y-salvos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
