spring:
  application:
    name: geoservice

server:
  port: 8083

xano:
  base-url: ${XANO_BASE_URL:https://petfind.xano.io/api:v1}
  api-key: ${XANO_API_KEY:}

geo:
  osm:
    tile-url-template: ${OSM_TILE_URL_TEMPLATE:https://tile.openstreetmap.org/{z}/{x}/{y}.png}
    attribution: ${OSM_ATTRIBUTION:© OpenStreetMap contributors}
    terms-url: ${OSM_TERMS_URL:https://www.openstreetmap.org/copyright}
